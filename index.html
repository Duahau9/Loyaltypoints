  <script src="/_sdk/48bf7c4c70d0d03c.data_sdk.js" integrity="sha512-e/yrQJz+prdXXt4yUvxXhl1WBGu3BRkP8X0fipGXI5gqiFClI7wI6K3TQnD7d63vx+BVhwzIvY6r8OrpX7lXJA=="></script>
  <script>
    // Stars
    (function() {
      const c = document.getElementById('stars-container');
      for (let i = 0; i < 80; i++) {
        const s = document.createElement('div');
        s.className = 'star-dot';
        s.style.left = Math.random() * 100 + '%';
        s.style.top = Math.random() * 100 + '%';
        s.style.animationDelay = Math.random() * 3 + 's';
        s.style.width = s.style.height = (Math.random() * 2 + 1) + 'px';
        c.appendChild(s);
      }
    })();

    const avatars = ['🎒','📚','🌈','🦄','🐱','🐶','🌻','🎨','🚀','🍎','🦊','🐼','🦋','🌸','⭐','🎵','🏀','🎮'];
    let selectedAvatar = avatars[0];
    let students = [];

    // Build avatar picker
    (function() {
      const picker = document.getElementById('avatar-picker');
      avatars.forEach(em => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'avatar-option' + (em === selectedAvatar ? ' selected' : '');
        btn.textContent = em;
        btn.addEventListener('click', () => {
          picker.querySelectorAll('.avatar-option').forEach(b => b.classList.remove('selected'));
          btn.classList.add('selected');
          selectedAvatar = em;
        });
        picker.appendChild(btn);
      });
    })();

    const dataHandler = {
      onDataChanged(data) {
        students = data;
        renderStudents();
      }
    };

    function renderStudents() {
      const list = document.getElementById('student-list');
      const empty = document.getElementById('empty-state');
      const existingMap = new Map([...list.children].map(el => [el.dataset.studentId, el]));

      if (students.length === 0) {
        empty.classList.remove('hidden');
        list.innerHTML = '';
        return;
      }
      empty.classList.add('hidden');

      const newIds = new Set(students.map(s => s.__backendId));
      existingMap.forEach((el, id) => { if (!newIds.has(id)) el.remove(); });

      students.forEach(s => {
        if (existingMap.has(s.__backendId)) {
          const el = existingMap.get(s.__backendId);
          el.querySelector('[data-template-id="student-name"]').textContent = s.name;
          el.querySelector('[data-template-id="student-course"]').textContent = s.course;
          el.querySelector('[data-template-id="points-display"]').textContent = s.points || 0;
          el.querySelector('.card-avatar').textContent = s.avatar || '🎒';
        } else {
          const tpl = document.getElementById('student-template');
          const clone = tpl.content.cloneNode(true);
          const wrapper = clone.firstElementChild;
          wrapper.dataset.studentId = s.__backendId;
          clone.querySelector('.card-avatar').textContent = s.avatar || '🎒';
          clone.querySelector('[data-template-id="student-name"]').textContent = s.name;
          clone.querySelector('[data-template-id="student-course"]').textContent = s.course;
          clone.querySelector('[data-template-id="points-display"]').textContent = s.points || 0;
          clone.querySelector('[data-template-id="plus-btn"]').addEventListener('click', () => addPoints(s.__backendId));
          clone.querySelector('[data-template-id="minus-btn"]').addEventListener('click', () => subtractPoints(s.__backendId));
          list.appendChild(clone);
        }
      });
    }

    async function addPoints(id) {
      const s = students.find(x => x.__backendId === id);
      if (!s) return;
      const btn = document.querySelector(`[data-student-id="${id}"] [data-template-id="plus-btn"]`);
      btn.disabled = true;
      const pointsEl = document.querySelector(`[data-student-id="${id}"] [data-template-id="points-display"]`);
      pointsEl.classList.add('pop');
      setTimeout(() => pointsEl.classList.remove('pop'), 300);
      const result = await window.dataSdk.update({ ...s, points: (s.points || 0) + 10 });
      btn.disabled = false;
      if (result.isError) showToast('Lỗi cập nhật điểm!');
    }

    async function subtractPoints(id) {
      const s = students.find(x => x.__backendId === id);
      if (!s || (s.points || 0) <= 0) return;
      const btn = document.querySelector(`[data-student-id="${id}"] [data-template-id="minus-btn"]`);
      btn.disabled = true;
      const card = document.querySelector(`[data-student-id="${id}"]`);
      card.classList.add('wiggle');
      setTimeout(() => card.classList.remove('wiggle'), 300);
      const result = await window.dataSdk.update({ ...s, points: Math.max(0, (s.points || 0) - 10) });
      btn.disabled = false;
      if (result.isError) showToast('Lỗi cập nhật điểm!');
    }

    document.getElementById('add-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      if (students.length >= 999) {
        document.getElementById('limit-warning').classList.remove('hidden');
        return;
      }
      const name = document.getElementById('input-name').value.trim();
      const course = document.getElementById('input-course').value.trim();
      if (!name || !course) return;
      const btn = document.querySelector('[data-template-id="add-button"]');
      btn.disabled = true;
      btn.style.opacity = '0.6';
      const result = await window.dataSdk.create({ name, course, points: 0, avatar: selectedAvatar });
      btn.disabled = false;
      btn.style.opacity = '1';
      if (result.isOk) {
        document.getElementById('input-name').value = '';
        document.getElementById('input-course').value = '';
      } else {
        showToast('Lỗi thêm học sinh!');
      }
    });

    function showToast(msg) {
      const t = document.createElement('div');
      t.className = 'fixed bottom-4 left-1/2 -translate-x-1/2 bg-red-500 text-white px-6 py-3 rounded-xl shadow-lg z-50 bounce-in';
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 3000);
    }

    (async () => {
      const r = await window.dataSdk.init(dataHandler);
      if (r.isError) showToast('Không thể kết nối dữ liệu!');
      lucide.createIcons();
    })();
  </script>
